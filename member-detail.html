<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMBER DETAIL - NOTAVAILABLE</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/logo 1.png">

    <!-- SEO & Social Media Meta Tags -->
    <meta name="description" content="ข้อมูลสมาชิกทีม NOTAVAILABLE - ผลงาน ไฮไลท์ และช่องทางการติดตาม">
    <meta property="og:title" content="MEMBER DETAIL - NOTAVAILABLE">
    <meta property="og:description" content="ร่วมติดตามผลงานของสมาชิกในทีม NOTAVAILABLE">
    <meta property="og:image" content="img/logo 1.png">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="particles"></div>
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    <img src="img/logo 1.png" alt="Notavailable Logo" class="logo-img">
                    <span class="logo-text">NOTAVAILABLE</span>
                </a>
                <nav class="nav">
                    <a href="index.html" class="nav-link">HOME</a>
                    <a href="members.html" class="nav-link">MEMBERS</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Member Detail Section -->
    <section class="detail-section">
        <div class="container">
            <a href="members.html" class="back-button">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                BACK TO MEMBERS
            </a>

            <div id="memberDetail" class="detail-content">
                <!-- Content will be loaded dynamically -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p class="copyright">&copy; 2026 NOTAVAILABLE. DESIGNED BY DEJE NOTAVAILABLE.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // Load member detail on page load
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const memberId = parseInt(urlParams.get('id'));

            if (memberId) {
                const member = membersData.find(m => m.id === memberId);
                if (member) {
                    document.title = `Notavailable - ${member.name.toUpperCase()}`;
                    displayMemberDetail(member);
                } else {
                    document.getElementById('memberDetail').innerHTML = `
                        <div class="error-state">
                            <h2>MEMBER NOT FOUND</h2>
                            <p>ขออภัย ไม่พบข้อมูลสมาชิกที่คุณค้นหา</p>
                            <a href="members.html" class="btn btn-primary">
                                <span>BACK TO MEMBERS</span>
                            </a>
                        </div>
                    `;
                }
            } else {
                window.location.href = 'members.html';
            }
        });

        function getYouTubeEmbedUrl(url) {
            if (!url) return null;
            let videoId = '';
            // Supports standard watch URLs, short URLs, and embed URLs
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            if (match && match[2].length === 11) {
                videoId = match[2];
            }
            return videoId ? `https://www.youtube.com/embed/${videoId}` : null;
        }

        function displayMemberDetail(member) {
            const detailContainer = document.getElementById('memberDetail');
            const videoEmbedUrl = member.videoHighlight ? getYouTubeEmbedUrl(member.videoHighlight) : null;
            const isLeader = member.role === 'LEADER' || member.role === 'TOP BOXING';
            const cardClass = isLeader ? 'card-leader' : 'card-member';
            const roleClass = isLeader ? 'role-leader' : 'role-member';

            const fbBtn = member.contact?.facebook ? `
                <a href="${member.contact.facebook}" target="_blank" rel="noopener" class="detail-social-btn fb">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    Facebook
                </a>` : '';

            const igBtn = member.contact?.instagram ? `
                <a href="${member.contact.instagram}" target="_blank" rel="noopener" class="detail-social-btn ig">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                    Instagram
                </a>` : '';

            const hasBio = member.bio && member.bio.trim().length > 1;

            detailContainer.innerHTML = `
                <div class="detail-layout">

                    <!-- Profile Card (left) -->
                    <div class="detail-profile-card ${cardClass}">
                        <div class="detail-card-img-wrap">
                            <img src="${member.avatar}" alt="${member.name}" class="detail-card-img" onerror="this.src='img/logo 1.png'">
                        </div>
                        <div class="detail-card-body">
                            <span class="detail-card-role ${roleClass}">${member.role}</span>
                            <h1 class="detail-card-name">${member.name}</h1>
                            ${fbBtn || igBtn ? `<div class="detail-card-social">${fbBtn}${igBtn}</div>` : ''}
                        </div>
                    </div>

                    <!-- Content Area (right) -->
                    <div class="detail-content-area">
                        ${videoEmbedUrl ? `
                            <div class="detail-section-wrapper">
                                <h2 class="detail-section-title">HIGHLIGHT</h2>
                                <div class="video-wrapper">
                                    <iframe src="${videoEmbedUrl}" title="YouTube video player" frameborder="0"
                                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                        allowfullscreen></iframe>
                                </div>
                                <div style="text-align:center; margin-top:0.75rem;">
                                    <a href="${member.videoHighlight}" target="_blank" rel="noopener" class="yt-link">
                                        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                                        Watch on YouTube
                                    </a>
                                </div>
                            </div>
                        ` : ''}

                        ${hasBio ? `
                            <div class="detail-section-wrapper">
                                <h2 class="detail-section-title">PERFORMANCE</h2>
                                <p class="detail-bio">${member.bio}</p>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }
    </script>
</body>

</html>
