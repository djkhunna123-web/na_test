<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | NOTAVAILABLE</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/logo 1.png">

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: var(--spacing-xl);
            position: relative;
            z-index: 1;
        }

        .error-content {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            padding: var(--spacing-3xl);
            border-radius: var(--radius-xl);
            max-width: 600px;
            width: 100%;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            font-family: var(--font-display);
            background: linear-gradient(180deg, var(--color-purple-primary) 0%, var(--color-indigo) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: var(--spacing-md);
            line-height: 1;
        }

        .error-title {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-md);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .error-message {
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-xl);
            font-size: 1.125rem;
            line-height: 1.6;
        }

        .error-btn {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
    </style>
</head>

<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="particles"></div>
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <main class="error-container">
        <div class="error-content">
            <div class="error-code">404</div>
            <h1 class="error-title">ไม่พบหน้านี้</h1>
            <p class="error-message">
                ดูเหมือนว่าหน้าที่คุณกำลังมองหาจะไม่มีอยู่จริง หรืออาจถูกย้ายไปที่อื่นแล้ว
            </p>
            <a href="index.html" class="btn btn-primary error-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                กลับสู่หน้าหลัก
            </a>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
